name: Compilar APK de Boveda

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Preparar carpeta www y motor astronomico
        run: |
          if [ -d WWW ] && [ ! -d www ]; then mv WWW www; fi
          mkdir -p www
          curl -L -o www/astronomy.browser.js https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.js
          ls -la www/

      - name: Instalar dependencias
        run: npm install

      - name: Anadir plataforma Android
        run: npx cap add android

      - name: Sincronizar
        run: npx cap sync android

      - name: Forzar permisos de ubicacion en el Manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i '0,/<manifest[^>]*>/s//&\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>/' "$MANIFEST"
          fi
          echo "==== AndroidManifest.xml ===="
          cat "$MANIFEST"

      - name: Permisos a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Boveda-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
