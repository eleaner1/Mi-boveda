name: Compilar APK de Boveda

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Descargar astronomy-engine
        run: |
          curl -L -o www/astronomy.browser.js https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.js

      - name: Instalar dependencias
        run: npm install

      - name: Anadir plataforma Android
        run: npx cap add android

      - name: Sincronizar
        run: npx cap sync android

      - name: Permisos a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Boveda-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
